name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --no-fail-fast
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo publish --dry-run -p fln-core --allow-dirty

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e python/fln
          pip install -e python/fln-mcp
          pip install -e python/fln-oracle
          pip install pytest jsonschema referencing
      - run: pytest python/fln/tests python/fln-mcp/tests python/fln-oracle/tests -q

  wire-compat:
    runs-on: ubuntu-latest
    needs: [rust, python]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e python/fln
      - run: cargo run --release --example wire_compat -p fln-core | tee rust.txt
      - run: python scripts/wire_compat.py | tee py.txt
      - run: diff rust.txt py.txt

  verify-theses:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p fln-cli
      - name: Verify every signed thesis in theses/
        run: |
          set -euo pipefail
          shopt -s nullglob
          for t in theses/*.thesis.json; do
            claim="${t%.thesis.json}.claim.json"
            ./target/release/fln thesis-verify --claim "$claim"
            ./target/release/fln causal-topo --thesis "$t" > /dev/null
          done
